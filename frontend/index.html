<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/logo-48.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/logo-64.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/logo-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VexPay</title>
    <script>
      (function () {
        var k = "vexpay.theme";
        var t = localStorage.getItem(k);
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
        document.documentElement.style.colorScheme = t;
        document.documentElement.classList.remove("light", "dark");
        document.documentElement.classList.add(t);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
