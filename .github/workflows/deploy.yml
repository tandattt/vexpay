name: Deploy VexPay

on:
  push:
    branches: [deployment]
  pull_request:
    branches: [deployment]

concurrency:
  group: deploy-vexpay
  cancel-in-progress: true

jobs:
  build_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore backend
        run: dotnet restore backend/VexPay.csproj

      - name: Build backend
        run: dotnet build backend/VexPay.csproj --no-restore -c Release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:5011
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/deployment'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "echo SSH OK"

      - name: Ensure remote folders exist
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p /home/dat/src/vexpay/backend /home/dat/src/vexpay/frontend"

      - name: Sync backend source
        run: |
          rsync -az \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".cursor" \
            --exclude "bin" \
            --exclude "obj" \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }}" \
            ./backend/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/dat/src/vexpay/backend/"

      - name: Sync frontend source
        run: |
          rsync -az \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".cursor" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude "dist-ssr" \
            --exclude ".vite" \
            --exclude ".env" \
            --exclude ".env.*.local" \
            --exclude ".env.production" \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }}" \
            ./frontend/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/dat/src/vexpay/frontend/"

      - name: Sync docker compose
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }}" \
            ./docker-compose.yml \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/dat/src/vexpay/docker-compose.yml"

      - name: Run docker compose
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'cd /home/dat/src/vexpay && \
             docker compose up --build -d && \
             sleep 10 && \
             docker ps --filter "name=vexpay-backend" --filter "status=running" | grep vexpay-backend && \
             docker ps --filter "name=vexpay-frontend" --filter "status=running" | grep vexpay-frontend'

      - name: Notify Telegram Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ Deploy SUCCESS: ${{ github.repository }} | branch=${{ github.ref_name }} | commit=${{ github.sha }}"

      - name: Notify Telegram Failed
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ Deploy FAILED: ${{ github.repository }} | branch=${{ github.ref_name }} | commit=${{ github.sha }}"
